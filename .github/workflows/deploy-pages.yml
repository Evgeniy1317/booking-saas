name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-booking-saas-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: mini-startup/package-lock.json
      - name: Install and build
        working-directory: mini-startup
        env:
          CI: true
        run: |
          npm ci
          npm run build:vite
      - name: SPA fallback for GitHub Pages
        run: cp mini-startup/dist/index.html mini-startup/dist/404.html
      - uses: actions/upload-pages-artifact@v4
        with:
          path: mini-startup/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
