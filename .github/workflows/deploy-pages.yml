name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-booking-saas-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mini-startup/package-lock.json
      - name: Install and build
        working-directory: mini-startup
        env:
          CI: true
          NODE_OPTIONS: --max-old-space-size=6144
        run: |
          npm ci
          npm run build:vite
      - name: Verify build output
        run: test -f mini-startup/dist/index.html
      - name: SPA fallback for GitHub Pages
        run: |
          cp mini-startup/dist/index.html mini-startup/dist/404.html
          touch mini-startup/dist/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: mini-startup/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
